name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Walkful.xcodeproj \
            -scheme Walkful \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO
        # Runner image specifics (Xcode version, simulator name) may need
        # tuning — adjust `xcode-version` / `-destination` to what the
        # macOS runner provides if this step can't find them.
