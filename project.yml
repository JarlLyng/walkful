name: Walkful
options:
  bundleIdPrefix: com.iamjarl
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: KDWZ3WNLDK
    CODE_SIGN_STYLE: Automatic
packages:
  IAMJARLDesignTokens:
    url: https://github.com/JarlLyng/iamjarl-design
    branch: main
targets:
  Walkful:
    type: application
    platform: iOS
    sources:
      - path: Walkful
    dependencies:
      - package: IAMJARLDesignTokens
    entitlements:
      path: Walkful/Walkful.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iamjarl.walkful
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Walkful
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Walkful reads your steps, distance and stairs from Apple Health to show your daily progress. Your data never leaves your device."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Walkful only reads your activity to show your progress — it does not write any data to Apple Health."
        TARGETED_DEVICE_FAMILY: "1"
