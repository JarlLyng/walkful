name: Walkful
options:
  bundleIdPrefix: com.iamjarl
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: KDWZ3WNLDK
    CODE_SIGN_STYLE: Automatic
packages:
  IAMJARLDesignTokens:
    url: https://github.com/JarlLyng/iamjarl-design
    branch: main
targets:
  Walkful:
    type: application
    platform: iOS
    sources:
      - path: Walkful
    dependencies:
      - package: IAMJARLDesignTokens
    entitlements:
      path: Walkful/Walkful.entitlements
      properties:
        com.apple.developer.healthkit: true
    # Managed Info.plist (generated by XcodeGen). Needed because
    # BGTaskSchedulerPermittedIdentifiers has no INFOPLIST_KEY_ build setting.
    info:
      path: Walkful/Info.plist
      properties:
        CFBundleDisplayName: Walkful
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Walkful reads your steps, distance and stairs from Apple Health to show your daily progress. Your data never leaves your device."
        NSHealthUpdateUsageDescription: "Walkful only reads your activity to show your progress — it does not write any data to Apple Health."
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.iamjarl.walkful.sedentary-check
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.iamjarl.walkful
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
