name: Walkful
options:
  bundleIdPrefix: com.iamjarl
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.2"
    CURRENT_PROJECT_VERSION: "6"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: KDWZ3WNLDK
    CODE_SIGN_STYLE: Automatic
packages:
  IAMJARLDesignTokens:
    url: https://github.com/JarlLyng/iamjarl-design
    branch: main
targets:
  Walkful:
    type: application
    platform: iOS
    sources:
      - path: Walkful
    dependencies:
      - package: IAMJARLDesignTokens
      - target: WalkfulWidget
    entitlements:
      path: Walkful/Walkful.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.iamjarl.walkful
    info:
      path: Walkful/Info.plist
      properties:
        CFBundleDisplayName: Walkful
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Walkful reads your steps, distance and stairs from Apple Health to show your daily progress. Your data never leaves your device."
        NSHealthUpdateUsageDescription: "Walkful only reads your activity to show your progress — it does not write any data to Apple Health."
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.iamjarl.walkful.sedentary-check
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.iamjarl.walkful
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"

  WalkfulWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WalkfulWidget
      - path: Walkful/Shared
      - path: Walkful/Core/Formatters.swift
    entitlements:
      path: WalkfulWidget/WalkfulWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.iamjarl.walkful
    info:
      path: WalkfulWidget/Info.plist
      properties:
        CFBundleDisplayName: Walkful
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.iamjarl.walkful.widget
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  Walkful:
    build:
      targets:
        Walkful: all
        WalkfulWidget: all
    run:
      config: Debug
      storeKitConfiguration: Walkful.storekit
    archive:
      config: Release
